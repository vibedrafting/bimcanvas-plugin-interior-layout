<svg viewBox="0 0 1500 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .main-lines { fill: none; stroke: #000000; stroke-width: 25; stroke-linecap: round; stroke-linejoin: round; }
      .detail-lines { fill: none; stroke: #000000; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }
      .fine-lines { fill: none; stroke: #000000; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- 1. Cabinet Body - 矩形外框 (Inset 13px) -->
  <rect x="13" y="13" width="1474" height="574" class="main-lines" />
  
  <!-- 2. Storage Symbol - X 形交叉线 (Crossed Box) -->
  <!-- 参考图为虚线交叉，转换为实线以符合 Clean CAD 标准 -->
  <line x1="13" y1="13" x2="1487" y2="587" class="fine-lines" />
  <line x1="1487" y1="13" x2="13" y2="587" class="fine-lines" />

</svg>
