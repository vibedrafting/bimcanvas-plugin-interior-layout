<svg viewBox="0 0 850 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .main-lines { fill: none; stroke: #000000; stroke-width: 25; stroke-linecap: round; stroke-linejoin: round; }
      .detail-lines { fill: none; stroke: #000000; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <!-- Countertop -->
  <rect x="13" y="13" width="824" height="524" class="main-lines" />
  <!-- Basin Oval -->
  <rect x="225" y="125" width="400" height="300" rx="80" ry="80" class="detail-lines" />
  <!-- Faucet Hole -->
  <circle cx="425" cy="70" r="15" class="detail-lines" />
</svg>
