<svg viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .curb-outline { fill: none; stroke: #000000; stroke-width: 15; stroke-linecap: square; stroke-linejoin: miter; }
      .glass-line { fill: none; stroke: #000000; stroke-width: 8; stroke-linecap: round; }
      .detail { fill: none; stroke: #000000; stroke-width: 5; }
    </style>
  </defs>
  
  <!-- CONTEXT: Standard rotation assumes walls at Top and Left. Enclosure on Bottom and Right. -->

  <!-- STONE CURB (50mm width representation) -->
  <!-- Outer Edge -->
  <polyline points="0,900 900,900 900,0" class="curb-outline" />
  <!-- Inner Edge (50mm offset) -->
  <polyline points="0,850 850,850 850,0" class="curb-outline" />
  <!-- Curb End Caps (at walls) -->
  <line x1="0" y1="900" x2="0" y2="850" class="curb-outline" />
  <line x1="900" y1="0" x2="850" y2="0" class="curb-outline" />

  <!-- GLASS ENCLOSURE (Centered on curb or slightly offset?) -->
  <!-- Right Side -->
  <!-- Fixed Panel (Top) -->
  <line x1="875" y1="0" x2="875" y2="450" class="glass-line" />
  <!-- Sliding Door (Bottom, overlapping inside) -->
  <line x1="860" y1="450" x2="860" y2="860" class="glass-line" />
  <!-- Door Handle -->
  <line x1="850" y1="500" x2="850" y2="550" class="detail" />

  <!-- Bottom Side -->
  <!-- Fixed Panel (Left) -->
  <line x1="0" y1="875" x2="450" y2="875" class="glass-line" />
  <!-- Sliding Door (Right, overlapping inside) -->
  <line x1="450" y1="860" x2="860" y2="860" class="glass-line" />
  <!-- Door Handle -->
  <line x1="500" y1="850" x2="550" y2="850" class="detail" />

  <!-- CORNER JOINT (Bottom-Right) -->
  <rect x="850" y="850" width="50" height="50" class="detail" />

  <!-- FLOOR DRAIN -->
  <circle cx="200" cy="200" r="40" class="detail" />
  <path d="M 180 180 L 220 220 M 220 180 L 180 220" class="detail" />
  
  <!-- TEXTURE (Anti-slip, subtle dots) -->
  <circle cx="450" cy="450" r="2" fill="black" />
  <circle cx="550" cy="550" r="2" fill="black" />
  <circle cx="350" cy="550" r="2" fill="black" />

</svg>
