<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900">
  <defs>
    <style>
      .main-lines { fill: none; stroke: #000000; stroke-width: 25; stroke-linecap: round; stroke-linejoin: round; }
      .detail-lines { fill: none; stroke: #000000; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }
      .fine-lines { fill: none; stroke: #000000; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <!-- L型淋浴屏：左上角两面靠墙，玻璃位于右侧和下侧 -->
  <!-- 底盘外缘/挡水条 -->
  <rect class="detail-lines" x="12.5" y="12.5" width="875" height="875" />
  <!-- L形玻璃隔断 -->
  <polyline class="main-lines" points="887.5,12.5 887.5,887.5 12.5,887.5" />
  <!-- 排水地漏 -->
  <circle class="fine-lines" cx="450" cy="450" r="40" />
  <line class="fine-lines" x1="420" y1="420" x2="480" y2="480" />
  <line class="fine-lines" x1="420" y1="480" x2="480" y2="420" />
</svg>
