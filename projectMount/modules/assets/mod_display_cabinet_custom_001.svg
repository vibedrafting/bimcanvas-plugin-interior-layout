<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .main-lines { fill: none; stroke: #000000; stroke-width: 25; stroke-linecap: round; stroke-linejoin: round; }
      .detail-lines { fill: none; stroke: #000000; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }
      .fine-lines { fill: none; stroke: #000000; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <!-- 外框 -->
  <rect x="13" y="13" width="774" height="424" class="main-lines" />
  <!-- 内缩轮廓 -->
  <rect x="35" y="35" width="730" height="380" class="detail-lines" />
  <!-- 对角线（储物柜标识） -->
  <line x1="35" y1="35" x2="765" y2="415" class="fine-lines" />
  <line x1="765" y1="35" x2="35" y2="415" class="fine-lines" />
</svg>
